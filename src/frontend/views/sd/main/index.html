<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLIT Vault</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dark-theme">
    <header>
      <div class="logo-box">GLIT<span>VAULT</span></div>
      <div class="search-container">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="search-icon"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          id="global-search"
          placeholder="SEARCH"
          autocomplete="off"
        />
      </div>
      <div class="header-controls">
        <button id="theme-toggle" onclick="toggleTheme()">
          <svg
            class="sun"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg
            class="moon"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <aside>
      <nav class="side-nav">
        <ul class="nav-menu">
          <li class="nav-link" onclick="loadView('overview', this)">
            Overview
          </li>
          <li class="nav-link" onclick="loadView('alerts', this)">Alerts</li>
          <li class="nav-link" onclick="loadView('watchlist', this)">
            Watchlist
          </li>
          <li class="nav-link" onclick="loadView('planner', this)">Planner</li>
          <hr />
          <li class="nav-link" onclick="loadView('database', this)">
            Database
          </li>
          <li class="nav-link" onclick="loadView('reports', this)">Reports</li>
          <li class="nav-link" onclick="loadView('comparison', this)">
            Comparison
          </li>
          <li class="nav-link" onclick="loadView('club', this)">Club</li>
        </ul>
        <div class="nav-footer">
          <div class="nav-link secondary-link">Settings</div>
          <div class="nav-link logout-btn">Sign Out</div>
        </div>
      </nav>
    </aside>

    <main id="content-shell">
      <div class="init-state">
        <h1>Select an area to start browsing</h1>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
